# -----------------------------------------------------------------------------
# Site Settings
# -----------------------------------------------------------------------------
title: "FM-Radio-Explorer"
description: "EEC 172 WQ26 Final Project"
url: "https://hawkhobo.github.io" # Change this to your URL
baseurl: "/FM-Radio-Explorer" # If your repo is username.github.io, leave empty. 
            # If it's username.github.io/my-project, put "/my-project" here.

# -----------------------------------------------------------------------------
# Theme Selection (Using the Remote Theme plugin)
# -----------------------------------------------------------------------------
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark" # Options: air, aqua, contrast, dark, dirt, neon, sunrise

# -----------------------------------------------------------------------------
# Plugins (Crucial for fixing your "Unknown tag" and "Dependency" errors)
# -----------------------------------------------------------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# -----------------------------------------------------------------------------
# Build Settings
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# -----------------------------------------------------------------------------
# Defaults for Posts and Pages (Fixes the "Layout requested does not exist" error)
# -----------------------------------------------------------------------------
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# -----------------------------------------------------------------------------
# Exclude these from the build
# -----------------------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
